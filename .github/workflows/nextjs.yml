name: Build Output

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Show build output
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== HTML files ==="
          find . -name "*.html" -not -path "*/node_modules/*" | head -20
          echo "=== Build folders =
